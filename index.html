<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/img/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./dist/output.css" />
    <title>Frontend Mentor | Age calculator app</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      defer
    ></script>
  </head>
  <body>
    <div class="card">
      <div class="input-area">
        <div id="day-div" class="inputs">
          <label for="day">DAY</label>
          <input
            type="number"
            id="day"
            name="day"
            placeholder="DD"
            tabindex="0"
          />
        </div>
        <div id="month-div" class="inputs">
          <label for="month">MONTH</label>
          <input
            type="number"
            id="month"
            name="month"
            placeholder="MM"
            tabindex="0"
          />
        </div>
        <div id="year-div" class="inputs">
          <label for="year">YEAR</label>
          <input
            type="number"
            id="year"
            name="year"
            placeholder="YYYY"
            tabindex="0"
          />
        </div>
      </div>
      <div class="button-hr-container">
        <div class="horizontal-rule"></div>
        <button id="submit-btn" class="circle-btn">
          <img src="./assets/img/icon-arrow.svg" alt="icon-btn" />
        </button>
      </div>
      <div class="display-section">
        <div class="display">
          <span id="years-result">--</span> <span id="years-text">years</span>
        </div>
        <div class="display">
          <span id="month-result">--</span> <span id="months-text">months</span>
        </div>
        <div class="display">
          <span id="days-result">--</span> <span id="days-text">days</span>
        </div>
      </div>
    </div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">mandy8055</a>.
    </div>
    <script defer src="./script/index.js"></script>
  </body>
</html>
