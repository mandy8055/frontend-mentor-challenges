<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/img/favicon-32x32.png"
    />
    <link rel="stylesheet" href="dist/output.css" />
    <title>Frontend Mentor | Age calculator app</title>
  </head>
  <body>
    <div class="card">
      <div class="input-area">
        <div class="inputs">
          <label for="day">DAY</label>
          <input type="text" id="day" name="day" placeholder="DD" />
        </div>
        <div class="inputs">
          <label for="month">MONTH</label>
          <input type="text" id="month" name="month" placeholder="MM" />
        </div>
        <div class="inputs">
          <label for="year">YEAR</label>
          <input type="text" id="year" name="year" placeholder="YYYY" />
        </div>
      </div>
      <hr />
      <div class="display-section">
        <div class="display">-- years</div>
        <div class="display">-- months</div>
        <div class="display">-- days</div>
      </div>
    </div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">mandy8055</a>.
    </div>
  </body>
</html>
